<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tailwind Components - PBT_06</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 p-6">
  <div class="space-y-8">
    <section>
      <h2 class="text-xl font-semibold mb-3">Buttons</h2>
      <div class="flex gap-3 flex-wrap">
        <button class="px-4 py-2 bg-blue-600 text-white rounded">Primary</button>
        <button class="px-4 py-2 bg-gray-200 text-gray-800 rounded">Secondary</button>
        <button class="px-4 py-2 border border-gray-300 rounded">Outline</button>
        <button class="px-4 py-2 bg-gray-300 text-gray-500 rounded" disabled>Disabled</button>
      </div>
    </section>

    <section>
      <h2 class="text-xl font-semibold mb-3">Cards</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="p-4 bg-white rounded shadow">Product card</div>
        <div class="p-4 bg-white rounded shadow">Profile card</div>
        <div class="p-4 bg-white rounded shadow">Pricing card</div>
      </div>
    </section>

    <section>
      <h2 class="text-xl font-semibold mb-3">Forms</h2>
      <form class="space-y-3 max-w-md">
        <label class="block">
          <span class="text-sm">Name</span>
          <input class="mt-1 block w-full rounded border-gray-300 focus:ring-blue-500" />
        </label>
        <label class="block">
          <span class="text-sm">Message</span>
          <textarea class="mt-1 block w-full rounded border-gray-300"></textarea>
        </label>
      </form>
    </section>

    <section>
      <h2 class="text-xl font-semibold mb-3">Alerts</h2>
      <div class="space-y-2">
        <div class="p-3 bg-green-100 text-green-800 rounded">Success alert <button class="ml-2">Close</button></div>
        <div class="p-3 bg-red-100 text-red-800 rounded">Error alert</div>
      </div>
    </section>
  </div>
</body>
</html>
