<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Animations Demo - PBT_05</title>
  <link rel="stylesheet" href="animations.css">
</head>
<body>
  <main style="max-width:1000px;margin:24px auto;padding:12px">
    <h2>1. Card Hover Effect</h2>
    <div class="cards">
      <div class="anim-card">
        <img src="https://via.placeholder.com/400x260?text=Hover" alt="">
        <h4>Card</h4>
      </div>
    </div>

    <h2>2. Button Hover</h2>
    <button class="anim-btn">Mua ngay</button>

    <h2>3. Image Zoom</h2>
    <div class="img-zoom"><img src="https://up.yimg.com/ib/th/id/OIP.30gdZ8zI3C2lph1IhZNNCgHaFj?pid=Api&rs=1&c=1&qlt=95&w=124&h=93" alt=""></div>

    <h2>4. Loading Spinner</h2>
    <div class="spinner"></div>

    <h2>5. Fade-in (on load)</h2>
    <div class="fade-in">Nội dung sẽ fade-in khi trang load</div>
  </main>
</body>
</html>
