<!DOCTYPE html> <!-- Sửa DOCTYPE đúng chuẩn HTML5 -->
<html lang="vi">
<head>
    <meta charset="UTF-8"> <!-- sửa utf8 → UTF-8 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang web</title> <!-- đóng thẻ title -->
</head>
<body>

    <!-- sửa đóng thẻ h1 -->
    <h1>Welcome to ShopTLU</h1>

    <header>
        <nav>
            <!-- sửa đóng thẻ a + thêm # -->
            <a href="#">Trang chủ</a>
            <a href="#">Sản phẩm</a>
        </nav>
    </header>

    <main>
        <section>
            <h2>Sản phẩm hot</h2> <!-- h3 → h2 cho đúng hierarchy -->

            <!-- thêm alt + dấu ngoặc -->
            <img src="https://encrypted-tbn2.gstatic.com/shopping?q=tbn:ANd9GcTz50OAHANYNXsatI83pr4ZP6pUcwC36P0twRPkcLGTPz590o_c_r-spyMPdBOVTNjcbUiKfAq8hasK37exC1gw33Ma-HvscacBpAxe2pi9qctnRB8QMMMWd-B7n8cvSSxQw6XQ-X0aZQ&usqp=CAc" alt="iPhone 16 Pro">

            <p>iPhone 16 Pro</p>

            <!-- sửa sai thứ tự thẻ -->
            <p>Giá: <strong>25.990.000đ</strong></p>
        </section>

        <section>
            <h2>Thông tin</h2>

            <!-- thêm thead/tbody -->
            <table border="1">
                <thead>
                    <tr>
                        <th>Tên</th> <!-- td → th -->
                        <th>Giá</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>iPhone</td>
                        <td>25tr</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <!-- sửa main → aside -->
    <aside>
        <p>Sidebar content</p>
    </aside>

    <footer>
        <!-- đóng thẻ p -->
        <p>Copyright 2026</p>
    </footer>

</body>
</html>

<!-- Lỗi 1: Dòng 1 — <!DOCTYPE> sai chuẩn — Sửa thành <!DOCTYPE html>

Lỗi 2: Dòng 4 — Thẻ <title> không đóng — Thêm </title>

Lỗi 3: Dòng 5 — charset viết sai (utf8) — Sửa thành UTF-8

Lỗi 4: Dòng 9 — Thẻ <h1> không đóng đúng — Sửa thành </h1>

Lỗi 5: Dòng 13 — Thẻ <a> không đóng — Thêm </a>

Lỗi 6: Dòng 13 — href không hợp lệ ("home") — Sửa thành "#" hoặc link hợp lệ

Lỗi 7: Dòng 21 — <img> thiếu dấu ngoặc kép và thiếu alt — Sửa src="..." và thêm alt

Lỗi 8: Dòng 23 — Thẻ <b> đóng sai vị trí — Sửa thành <strong>... </strong> trong <p>

Lỗi 9: Dòng 19 — Dùng <h3> không hợp lý — Sửa thành <h2> (đúng cấp heading)

Lỗi 10: Dòng 29 — Bảng dùng <td> cho header — Sửa thành <th>

Lỗi 11: Dòng 28 — Thiếu <thead> và <tbody> — Bổ sung cấu trúc bảng

Lỗi 12: Dòng 36 — Dùng <main> lần 2 sai semantic — Sửa thành <aside>

Lỗi 13: Dòng 41 — Thẻ <p> không đóng — Thêm </p>

Lỗi 14: Thiếu lang="vi" trong <html> — Thêm thuộc tính ngôn ngữ -->
