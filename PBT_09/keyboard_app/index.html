<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard Shortcuts & Accessibility - Gallery & Command Palette</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <h1>🖼️ Gallery Viewer</h1>
            <p class="subtitle">Dùng mũi tên ◀️ ▶️ để chuyển ảnh | Số 1-9 để nhảy | Space để play/pause | Esc để thoát</p>
        </div>

        <div class="header-controls">
            <button id="commandPaletteBtn" class="btn-command" aria-label="Mở command palette (Ctrl+K)">
                ⌨️ Lệnh (Ctrl+K)
            </button>
            <button id="fullscreenBtn" class="btn-fullscreen" aria-label="Toàn màn hình (F)">
                🖥️ Toàn màn hình
            </button>
        </div>
    </header>

    <!-- Main Gallery -->
    <main class="gallery-container">
        <div class="gallery-wrapper">
            <!-- Image Display -->
            <div class="image-container" id="imageContainer">
                <img id="galleryImage" src="" alt="Gallery image" class="gallery-image">
                <div class="image-controls">
                    <button id="prevBtn" class="btn-nav" aria-label="Ảnh trước (Mũi tên trái)">◀️</button>
                    <button id="nextBtn" class="btn-nav" aria-label="Ảnh tiếp (Mũi tên phải)">▶️</button>
                </div>
            </div>

            <!-- Image Info -->
            <div class="image-info">
                <h2 id="imageName" class="image-title">Gallery Title</h2>
                <p id="imageDesc" class="image-description">Mô tả ảnh</p>
                <div class="image-meta">
                    <span id="imageCount" class="image-counter">1/9</span>
                    <span id="slideStatus" class="slide-status">⏸️ Dừng</span>
                </div>
                <div class="image-actions">
                    <button id="playBtn" class="btn-play" aria-label="Play/Pause (Space)">
                        ▶️ Phát
                    </button>
                    <button id="zoomInBtn" class="btn-zoom" aria-label="Phóng to (+)">
                        🔍 Phóng to
                    </button>
                    <button id="zoomOutBtn" class="btn-zoom" aria-label="Thu nhỏ (-)">
                        🔍 Thu nhỏ
                    </button>
                </div>
            </div>
        </div>

        <!-- Thumbnails Navigation -->
        <div class="thumbnails" id="thumbnails" aria-label="Danh sách ảnh">
            <!-- Thumbnails will be generated by JS -->
        </div>
    </main>

    <!-- Command Palette Modal -->
    <div id="commandPalette" class="command-palette hidden" role="dialog" aria-modal="true" aria-labelledby="commandTitle">
        <div class="palette-overlay" id="paletteOverlay"></div>
        <div class="palette-content">
            <div class="palette-header">
                <h2 id="commandTitle">⌨️ Command Palette</h2>
                <input 
                    id="commandSearch" 
                    type="text" 
                    class="palette-search" 
                    placeholder="Gõ lệnh... (ví dụ: 'play', 'next', 'full')"
                    aria-label="Tìm kiếm lệnh"
                >
            </div>

            <div id="commandList" class="palette-list" role="listbox">
                <!-- Commands will be generated by JS -->
            </div>

            <div class="palette-footer">
                <p>↑↓ Chọn | Enter Thực hiện | Esc Thoát</p>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

    <!-- Focus Ring Indicator -->
    <div class="focus-indicator" id="focusIndicator"></div>

    <script src="app.js"></script>
</body>
</html>
