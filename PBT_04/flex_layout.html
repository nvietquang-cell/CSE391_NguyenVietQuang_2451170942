<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Flexbox Easy</title>

<style>
/* ===== NAVBAR ===== */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: black;
  color: white;
  padding: 10px;
}

.menu a, .auth a {
  color: white;
  text-decoration: none;
  margin: 0 10px;
}

/* ===== PRODUCT CONTAINER ===== */
.container {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding: 10px;
}

/* ===== CARD ===== */
.card {
  width: 23%; /* gần 4 cột */
  border: 1px solid #ccc;
  padding: 10px;
  display: flex;
  flex-direction: column;
}

/* ảnh */
.card img {
  width: 100%;
}

/* nút mua */
.btn {
  margin-top: auto;
  background: black;
  color: white;
  text-align: center;
  padding: 5px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div>LOGO</div>

  <div class="menu">
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">About</a>
  </div>

  <div class="auth">
    <a href="#">Login</a>
    <a href="#">Register</a>
  </div>
</div>
