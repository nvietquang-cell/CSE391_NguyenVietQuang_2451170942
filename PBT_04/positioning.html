<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Layout Demo</title>
    <link rel="stylesheet" href="positioning.css">
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">LOGO</div>
  <nav>
    <a href="#" style="color:white; margin-left:15px;">Home</a>
    <a href="#" style="color:white; margin-left:15px;">Shop</a>
    <a href="#" style="color:white; margin-left:15px;">Contact</a>
  </nav>
</header>

<!-- MAIN -->
<div class="container">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h3>Sidebar</h3>
    <p>Menu / Filter / Content...</p>
  </aside>

  <!-- CONTENT -->
  <main class="content">

    <!-- PRODUCT CARD -->
    <div class="product-card">
      <div class="badge-hot">HOT</div>
      <h4>Sản phẩm A</h4>
      <p>Mô tả sản phẩm...</p>
    </div>

    <div class="product-card">
      <div class="badge-hot">HOT</div>
      <h4>Sản phẩm B</h4>
      <p>Mô tả sản phẩm...</p>
    </div>

    <!-- fake scroll -->
    <div style="height: 1200px;"></div>

  </main>
</div>

<!-- SCROLL TO TOP -->
<button id="toTop">↑</button>


</body>
</html>
