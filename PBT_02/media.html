<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giới thiệu sản phẩm</title>
</head>
<body>

    <h1>Trang giới thiệu sản phẩm</h1>

    <!-- SVG Logo -->
    <h2>Logo thương hiệu</h2>
    <svg width="120" height="120">
        <circle cx="60" cy="60" r="50" fill="skyblue" stroke="black" stroke-width="3"/>
        <text x="50%" y="50%" text-anchor="middle" dy=".3em" font-size="20">LOGO</text>
    </svg>

    <!-- Hình ảnh sản phẩm -->
    <h2>Hình ảnh sản phẩm</h2>

    <figure>
        <img src="https://cdn.tgdd.vn/Files/2021/01/31/1324283/iphone-12-mini-128gb-282320-042317_800x533.jpg" alt="Sản phẩm 1 màu đỏ thiết kế hiện đại"
             loading="lazy"
             style="max-width:100%; height:auto;">
        <figcaption>Sản phẩm 1 - Thiết kế hiện đại</figcaption>
    </figure>

    <figure>
        <img src="https://24hstore.vn/upload_images/images/SEO/iphone-11-mau-xanh-phien-ban-mau-sac-ban-chay-nhat-2020-4.jpg" alt="Sản phẩm 2 màu xanh kiểu dáng sang trọng"
             loading="lazy"
             style="max-width:100%; height:auto;">
        <figcaption>Sản phẩm 2 - Sang trọng và tinh tế</figcaption>
    </figure>

    <figure>
        <img src="https://didongviet.vn/dchannel/wp-content/uploads/2024/04/hinh-anh-thuc-te-iphone-11-mau-den-didongviet-2.jpg" alt="Sản phẩm 3 màu đen"
             loading="lazy"
             style="max-width:100%; height:auto;">
        <figcaption>Sản phẩm 3 - Nhỏ gọn, tiện lợi</figcaption>
    </figure>

    <!-- Video YouTube -->
    <h2>Video giới thiệu (YouTube)</h2>
       <iframe width="560" height="315" src="https://www.youtube.com/embed/RkF0Qih8JPg?si=3URcoqnFrzpMpFQ0" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</iframe>

    <!-- Video HTML -->
    <h2>Video demo sản phẩm</h2>
    <video controls width="560" poster="poster.jpg">
        <source src="videodemo.mp4" type="video/mp4">
        Trình duyệt của bạn không hỗ trợ video.
    </video>

    <!-- Audio -->
    <h2>Nhạc nền</h2>
    <audio controls>
        <source src="nhacdemo.mp3" type="audio/mpeg">
        Trình duyệt của bạn không hỗ trợ audio.
    </audio>

</body>
</html>
