<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>User Directory</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="navbar">
    <h1 class="logo">👥 User Directory</h1>
  </div>
  
  <div class="container">
    <div class="toolbar">
      <input id="search" placeholder="Search by name or email..." />
      <button id="create" class="btn btn-primary">➕ New User</button>
    </div>
    
    <div id="loading" class="loading hidden">⏳ Loading users...</div>
    <div id="error-message" class="error-message hidden"></div>
    <div id="users" class="grid"></div>
  </div>
  
  <!-- Modal Form -->
  <div id="modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">New User</h2>
        <button class="close-modal">✕</button>
      </div>
      
      <form id="user-form" class="user-form">
        <div class="form-group">
          <label for="form-name">Name *</label>
          <input id="form-name" type="text" placeholder="John Doe" required />
          <span class="error-text"></span>
        </div>
        
        <div class="form-group">
          <label for="form-email">Email *</label>
          <input id="form-email" type="email" placeholder="john@example.com" required />
          <span class="error-text"></span>
        </div>
        
        <div class="form-group">
          <label for="form-phone">Phone</label>
          <input id="form-phone" type="text" placeholder="+1 (555) 123-4567" />
        </div>
        
        <div class="form-group">
          <label for="form-company">Company</label>
          <input id="form-company" type="text" placeholder="Acme Corp" />
        </div>
        
        <div class="form-actions">
          <button type="button" class="btn btn-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Save User</button>
        </div>
      </form>
    </div>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
